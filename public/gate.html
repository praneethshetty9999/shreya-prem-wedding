<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shreya &amp; Prem</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fdf3e0;
        font-family: 'Source Code Pro', ui-monospace, Consolas, monospace;
        color: #7c3b24;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        text-align: center;
      }
      h1 {
        font-family: Georgia, 'Times New Roman', serif;
        font-weight: 700;
        font-size: 1.85rem;
        letter-spacing: 0.02em;
        color: #e4492a;
        margin: 0 0 0.5rem;
      }
      p.sub {
        margin: 0 0 2rem;
        font-size: 0.95rem;
        letter-spacing: 0.05em;
        color: #b98d4f;
      }
      form {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        border: 1px solid #e4492a;
        border-radius: 999px;
        padding: 0.65rem 1.25rem;
        transition: opacity 0.2s ease;
      }
      input {
        flex: 1;
        min-width: 0;
        border: none;
        background: transparent;
        outline: none;
        font: inherit;
        font-size: 1.05rem;
        color: #7c3b24;
      }
      input::placeholder {
        color: rgba(228, 73, 42, 0.5);
      }
      button {
        border: none;
        background: transparent;
        color: #e4492a;
        cursor: pointer;
        font-size: 1.2rem;
        line-height: 1;
        padding: 0;
        transition: transform 0.2s ease;
      }
      button:hover {
        transform: translateX(2px);
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
        transform: none;
      }
      .error {
        margin-top: 0.75rem;
        font-size: 0.85rem;
        color: #e4492a;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Shreya &amp; Prem</h1>
      <p class="sub">Please enter the password to continue</p>
      <form id="gate-form">
        <input
          id="password"
          type="password"
          placeholder="Password"
          autocomplete="off"
          autofocus
        />
        <button type="submit" id="submit-btn" aria-label="Submit">&#8594;</button>
      </form>
      <p class="error" id="error" role="alert"></p>
    </div>

    <script>
      var form = document.getElementById('gate-form')
      var input = document.getElementById('password')
      var error = document.getElementById('error')
      var submitBtn = document.getElementById('submit-btn')
      var params = new URLSearchParams(location.search)
      var next = params.get('next') || '/'

      form.addEventListener('submit', function (event) {
        event.preventDefault()
        error.textContent = ''
        submitBtn.disabled = true

        fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: input.value }),
        })
          .then(function (res) {
            if (res.ok) {
              location.href = next
              return
            }
            error.textContent = 'Incorrect password — please try again.'
            input.value = ''
            input.focus()
            submitBtn.disabled = false
          })
          .catch(function () {
            error.textContent = 'Something went wrong — please try again.'
            submitBtn.disabled = false
          })
      })
    </script>
  </body>
</html>
